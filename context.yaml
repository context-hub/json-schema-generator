$schema: 'https://raw.githubusercontent.com/context-hub/generator/refs/heads/main/json-schema.json'

documents:
  - description: 'Project structure overview'
    outputPath: project-structure.md
    overwrite: true
    sources:
      - type: tree
        sourcePaths:
          - src
        filePattern: '*'
        renderFormat: ascii
        enabled: true
        showCharCount: true

  - description: 'Code base'
    outputPath: code-base.md
    sources:
      - type: file
        sourcePaths:
          - src

  - description: Unit tests
    outputPath: unit-tests.md
    sources:
      - type: file
        sourcePaths:
          - tests

tools:
  - id: run-all-tests
    description: "Run all PHPUnit tests for the json-schema-generator"
    type: run
    commands:
      - cmd: composer
        args:
          - install
        workingDir: "./"
      - cmd: vendor/bin/phpunit
        args:
          - "--color=always"
        workingDir: "./"

  - id: run-union-tests
    description: "Run only the union type tests"
    type: run
    commands:
      - cmd: composer
        args:
          - install
        workingDir: "./"
      - cmd: vendor/bin/phpunit
        args:
          - "--color=always"
          - "--filter=UnionType"
        workingDir: "./"
